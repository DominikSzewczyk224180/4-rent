<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Strona nie znaleziona | 4Rent</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#0E2138">
<link rel="icon" href="/assets/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@500;600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/styles.css?v=6">
<style>
  .notfound{display:flex;align-items:center;min-height:62vh;padding:clamp(2.5rem,6vw,5rem) 0;background:var(--paper)}
  .notfound__inner{max-width:640px}
  .notfound__code{font-family:var(--font-mono);font-size:.75rem;letter-spacing:.18em;text-transform:uppercase;color:var(--accent-deep)}
  .notfound h1{margin:.5rem 0 .9rem}
  .notfound__actions{display:flex;flex-wrap:wrap;gap:.8rem;margin-top:1.8rem}
</style>
</head>
<body>

<header class="site-header">
  <div class="container nav">
    <a href="/" class="logo" aria-label="4Rent, strona główna">
      <img class="logo__img" src="/assets/logo-4rent-white.png" alt="4Rent Wypożyczalnia Maszyn Budowlanych" width="60" height="50">
      <span class="logo__text"><span class="logo__name"><b>4</b>RENT</span></span>
    </a>
    <a class="link-arrow link-arrow--light" href="/#oferta">Przejdź do oferty
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m13 6 6 6-6 6"/></svg>
    </a>
  </div>
</header>

<main class="notfound">
  <div class="container">
    <div class="notfound__inner">
      <span class="notfound__code">Błąd 404</span>
      <h1 class="h-lg">Nie znaleźliśmy tej strony</h1>
      <p class="lead">Strona mogła zostać przeniesiona lub nie istnieje. Wróć na stronę główną albo przejdź prosto do oferty maszyn.</p>
      <div class="notfound__actions">
        <a class="btn btn--accent btn--lg" href="/">Strona główna</a>
        <a class="btn btn--outline btn--lg" href="/#oferta">Zobacz ofertę</a>
        <a class="btn btn--outline btn--lg" href="/#kontakt">Kontakt</a>
      </div>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="rule-strip" aria-hidden="true"></div>
  <div class="container">
    <div class="footer__bottom">
      <span>© 2026 4Rent Wypożyczalnia Maszyn Budowlanych sp. z o.o.</span>
      <a href="/">Strona główna</a>
    </div>
  </div>
</footer>

</body>
</html>
